name: ci

on:
  push:
  pull_request:

permissions: read-all

jobs:
  unit-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v3.1.5

      - name: Create virtual environment
        run: uv venv

      - name: Install project
        run: uv pip install -e ".[dev]"

      - name: Static checks
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q --tb=short --cov=darkprompt --cov-report=term-missing 2>&1 | tee pytest.log

      - name: Upload failed test log
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.1
        with:
          name: pytest-${{ matrix.python-version }}
          path: pytest.log

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v3.1.5

      - name: Build distributions
        run: uvx --from build pyproject-build

      - name: Verify wheel contents
        run: |
          python -m zipfile -l dist/*.whl
          test -f dist/*.tar.gz
