name: ci

on:
  push:
  pull_request:

permissions: read-all

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v3.1.5

      - name: Create venv
        run: uv venv

      - name: Install deps
        run: |
          uv pip install -e .
          uv pip install pytest

      - name: Pytest
        run: uv run pytest -ra
