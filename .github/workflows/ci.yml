name: ci

on:
  push:
  pull_request:

permissions: read-all

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3.1.5

      - name: Create venv
        run: uv venv

      - name: Install deps
        run: |
          uv pip install -e .
          uv pip install pytest

      - name: Pytest
        run: uv run pytest -ra
