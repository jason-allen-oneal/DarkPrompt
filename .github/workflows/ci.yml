name: ci

on:
  push:
  pull_request:

permissions: read-all

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v3.1.5

      - name: Create venv
        run: uv venv

      - name: Install deps
        run: |
          uv pip install -e .
          uv pip install pytest

      - name: Pytest
        run: uv run pytest -ra
