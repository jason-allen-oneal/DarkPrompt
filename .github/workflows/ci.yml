name: ci

on:
  push:
  pull_request:

permissions: read-all

jobs:
  unit-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v3.1.5

      - name: Create virtual environment
        run: uv venv

      - name: Install project
        run: uv pip install -e ".[dev]"

      - name: Static checks
        run: uv run ruff check .

      - name: Test
        run: |
          set -o pipefail
          uv run pytest -q --tb=short --cov=darkprompt --cov-report=term-missing 2>&1 | tee pytest.log

      - name: Upload failed test log
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.1
        with:
          name: pytest-${{ matrix.python-version }}
          path: pytest.log

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v5.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v3.1.5

      - name: Build distributions
        run: uvx --from build pyproject-build

      - name: Verify wheel contents
        run: |
          python -m zipfile -l dist/*.whl
          test -f dist/*.tar.gz
